version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day: saturday
    groups:
      npm-development:
        dependency-type: development
        update-types:
          - minor
          - patch
      npm-production:
        dependency-type: production
        update-types:
          - minor
          - patch
    ignore:
      # v3+ is pure ESM — incompatible with @vercel/ncc's CJS bundling
      - dependency-name: '@actions/core'
        update-types:
          - version-update:semver-major
      # v9+ is pure ESM — incompatible with @vercel/ncc's CJS bundling
      - dependency-name: '@actions/github'
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: saturday
